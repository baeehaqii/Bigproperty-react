<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3f4f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e5e7eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGradient)"/>
  
  <!-- Image icon -->
  <g transform="translate(150, 100)">
    <!-- Image frame -->
    <rect x="0" y="0" width="100" height="80" rx="8" ry="8" fill="#d1d5db" stroke="#9ca3af" stroke-width="2"/>
    
    <!-- Mountain landscape -->
    <polygon points="15,65 35,35 55,55 75,25 90,65" fill="#9ca3af"/>
    
    <!-- Sun -->
    <circle cx="25" cy="25" r="10" fill="#fbbf24"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">
    Image Placeholder
  </text>
</svg>
